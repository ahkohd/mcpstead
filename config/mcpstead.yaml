host: "127.0.0.1"
port: 8766

mcp:
  auth:
    mode: none

servers:
  - name: example
    url: http://127.0.0.1:3000/mcp
    protocol: streamable
    required: false
    tls_skip_verify: false
    auth: none
    quirks:
      normalize_sse_events: true
      inject_accept_header: "application/json, text/event-stream"
    reconnect:
      max_attempts: 0
      backoff_base_ms: 1000
      backoff_max_ms: 30000
    tools:
      ttl_seconds: 300

metrics:
  enabled: true

logging:
  level: info
